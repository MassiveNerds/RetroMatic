<form
  class="login-page topography-svg-bg"
  [formGroup]="loginForm"
  (ngSubmit)="login()"
>
  <mat-card class="login-page__card mat-elevation-z6">
    <mat-card-content class="login-page__card-content">
      <p *ngIf="error" class="error-text mat-body-1"><strong>Oh snap!</strong> {{ error.message }}</p>
      <mat-form-field>
        <input #email type="email" matInput placeholder="Email address" formControlName="emailFormControl" />
        <mat-error
          *ngIf="
            loginForm.controls['emailFormControl'].hasError('email') &&
            !loginForm.controls['emailFormControl'].hasError('required')
          "
        >
          Please enter a valid email address
        </mat-error>
        <mat-error *ngIf="loginForm.controls['emailFormControl'].hasError('required')">
          Email is <strong>required</strong>
        </mat-error>
      </mat-form-field>
      <mat-form-field>
        <input #password type="password" matInput placeholder="Password" formControlName="passwordFormControl" />
        <mat-error *ngIf="loginForm.controls['passwordFormControl'].hasError('required')">
          Password is <strong>required</strong>
        </mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button class="login__reset-password-button" mat-button color="primary" (click)="goToResetPassword()">
        Reset password
      </button>
      <button mat-raised-button color="accent" (click)="loginWithGoogle($event)" aria-label="Sign in with Google">
        Sign in with Google
      </button>
      <button mat-raised-button color="primary" type="submit">Sign in</button>
    </mat-card-actions>
    <mat-card-actions class="login__lower-options" align="center">
      <p class="mat-body">
        Don't have an account? <button mat-button color="primary" (click)="goToRegister()">Sign up</button>
      </p>
      <p class="mat-body">
        Just joining a retrospective?
        <button mat-button color="primary" (click)="loginAsGuest($event)">Continue as guest</button>
      </p>
    </mat-card-actions>
  </mat-card>
</form>
